apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai-cpu:v0.24.0-x86_64
        command: ["/bin/sh", "-c"]
        args: [
          "vllm serve HuggingFaceTB/SmolLM2-135M-Instruct --enforce-eager"
        ]
        env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "2"
        ports:
          - containerPort: 8000
        resources:
          requests: {cpu: "2", memory: "3Gi"}
          limits: {cpu: "4", memory: "4Gi"}
        volumeMounts:
          - name: llama-storage
            mountPath: /root/.cache/huggingface
      volumes:
      - name: llama-storage
        persistentVolumeClaim:
          claimName: vllm-models
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: default
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP