apiVersion: apps/v1
kind: Deployment
metadata:
  name: anime-rec-app-groq
  namespace: default
  labels:
    app.kubernetes.io/name: anime-rec-app-groq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anime-rec-app-groq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anime-rec-app-groq
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      # Chroma/SQLite needs a WRITABLE dir; the image bakes chroma_db into the
      # read-only rootfs. Seed it into an emptyDir the app can write to.
      initContainers:
        - name: seed-chroma
          image: us-central1-docker.pkg.dev/PROJECT_ID/anime-rec/anime-rec-app-groq:PLACEHOLDER
          command: ["sh", "-c", "cp -r /app/chroma_db/. /seed/ && echo chroma seeded"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits: {cpu: "250m", memory: "256Mi"}
          volumeMounts:
            - {name: chroma, mountPath: /seed}
      containers:
        - name: app
          # Pushed by the app-deploy-groq pipeline; pinned to a digest at deploy.
          image: us-central1-docker.pkg.dev/PROJECT_ID/anime-rec/anime-rec-app-groq:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            # Hosted Groq fallback instead of the self-hosted vLLM router.
            - name: LLM_PROVIDER
              value: "groq"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anime-rec-groq
                  key: GROQ_API_KEY
            # all-MiniLM-L6-v2 is baked into the image at /opt/hf and loaded offline.
            - name: HF_HOME
              value: "/opt/hf"
          resources:
            requests: {cpu: "250m", memory: "768Mi"}
            limits: {cpu: "1", memory: "2Gi"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: {path: /_stcore/health, port: 8501}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /_stcore/health, port: 8501}
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
            - {name: streamlit, mountPath: /home/app/.streamlit}
            - {name: chroma, mountPath: /app/chroma_db} # writable, seeded by initContainer
      volumes:
        - {name: tmp, emptyDir: {}}
        - {name: streamlit, emptyDir: {}}
        - {name: chroma, emptyDir: {}}
